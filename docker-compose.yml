services:
  postgres:
    image: postgres:16
    container_name: tradeuz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tradeuz
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - tradeuz-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tradeuz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tradeuz-postgres-data:
